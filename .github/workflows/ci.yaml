name: CI/CD — Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hospital-amazonas-pires
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------ #
  # JOB 1 — Lint & Validação                                           #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint & Validação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Validar Dockerfile com Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Validar nginx.conf
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/nginx.conf:/etc/nginx/conf.d/app.conf:ro \
            nginx:1.27-alpine nginx -t

  # ------------------------------------------------------------------ #
  # JOB 2 — Build & Testes                                             #
  # ------------------------------------------------------------------ #
  build-test:
    name: Build & Teste
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem (sem push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Subir container de teste
        run: |
          docker run -d --name hospital-test -p 8080:8080 ${{ env.IMAGE_NAME }}:test
          sleep 3

      - name: Testar health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          echo "Health check retornou: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FALHOU — esperado 200" && exit 1)

      - name: Testar se index.html é servido
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Index retornou: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FALHOU — esperado 200" && exit 1)

      - name: Parar container de teste
        if: always()
        run: docker rm -f hospital-test || true

  # ------------------------------------------------------------------ #
  # JOB 3 — Security Scanning com Trivy                                #
  # ------------------------------------------------------------------ #
  security-scan:
    name: Security Scan — Trivy
    runs-on: ubuntu-latest
    needs: build-test

    permissions:
      security-events: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild da imagem para o scan
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha

      - name: Instalar Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Escanear imagem com Trivy
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            ${{ env.IMAGE_NAME }}:test

      - name: Gerar relatório SARIF
        if: always()
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            ${{ env.IMAGE_NAME }}:test

      - name: Enviar relatório ao GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

      - name: Resumo do scan
        if: always()
        run: |
          echo "### Security Scan — Trivy" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.IMAGE_NAME }}:test\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Severidades verificadas | \`CRITICAL, HIGH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| CVEs sem fix | ignorados |" >> $GITHUB_STEP_SUMMARY
          echo "| Relatório | aba Security → Code scanning |" >> $GITHUB_STEP_SUMMARY

  # ------------------------------------------------------------------ #
  # JOB 4 — Push para o Docker Hub (apenas em push, não em PR)        #
  # ------------------------------------------------------------------ #
  push:
    name: Push → Docker Hub
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.sha_tag.outputs.tag }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar tags e labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Extrair tag sha para os deploys
        id: sha_tag
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep "sha-" | head -1 | cut -d: -f2)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # JOB 5 — Deploy DEV (automático — branch develop)                  #
  # ------------------------------------------------------------------ #
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: dev
      url: http://dev.hospital-amazonas-pires.local

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig (DEV)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: Injetar tag da imagem no overlay dev
        run: |
          cd k8s/overlays/dev
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}

      - name: Criar namespace dev (se não existir)
        run: kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply via Kustomize — DEV
        run: kubectl apply -k k8s/overlays/dev

      - name: Aguardar rollout
        run: kubectl rollout status deployment/hospital-amazonas-pires -n dev --timeout=120s

      - name: Resumo do deploy
        run: |
          echo "### DEV — Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`dev\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ------------------------------------------------------------------ #
  # JOB 6 — Deploy STAGING (automático — branch main)                 #
  # ------------------------------------------------------------------ #
  deploy-staging:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://staging.hospital-amazonas-pires.local

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Kustomize nativamente
        run: |
          if ! command -v kustomize &> /dev/null; then
            echo "Kustomize não encontrado. Instalando..."
            curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
            sudo mv kustomize /usr/local/bin/
          else
            echo "Kustomize já está instalado!"
          fi

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig (Staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config

      - name: Debug do Kubeconfig
        run: |
          echo "Tamanho do arquivo gerado:"
          wc -c ~/.kube/config
          echo "Endereço do servidor configurado:"
          grep server ~/.kube/config || echo "Nenhum servidor encontrado! O arquivo pode estar vazio."    

      - name: Injetar tag da imagem no overlay staging
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}

      - name: Criar namespace staging
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_CONTENT" > ~/.kube/config
          export KUBECONFIG=~/.kube/config
          # Agora o kubectl terá o arquivo de configuração e autorização
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f - --validate=false

      - name: Apply via Kustomize — Staging
        run: kubectl apply -k k8s/overlays/staging

      - name: Aguardar rollout
        run: kubectl rollout status deployment/hospital-amazonas-pires -n staging --timeout=120s

      - name: Resumo do deploy
        run: |
          echo "### Staging — Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`staging\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ------------------------------------------------------------------ #
  # JOB 7 — Deploy PROD (aguarda aprovação manual)                    #
  # ------------------------------------------------------------------ #
  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    needs: [push, deploy-staging]
    environment:
      name: prod
      url: http://hospital-amazonas-pires.com

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig (Prod)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Injetar tag da imagem no overlay prod
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}

      - name: Criar namespace prod (se não existir)
        run: kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply via Kustomize — Prod
        run: kubectl apply -k k8s/overlays/prod

      - name: Aguardar rollout
        run: kubectl rollout status deployment/hospital-amazonas-pires -n prod --timeout=180s

      - name: Resumo do deploy
        run: |
          echo "### Prod — Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`prod\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.IMAGE_NAME }}:${{ needs.push.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Aprovado por | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
