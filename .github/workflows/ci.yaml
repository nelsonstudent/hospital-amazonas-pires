name: CI/CD — Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hospital-amazonas

jobs:
  # ------------------------------------------------------------------ #
  # JOB 1 — Lint & Validação                                           #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint & Validação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar Dockerfile com Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Validar nginx.conf
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/nginx.conf:/etc/nginx/conf.d/app.conf:ro \
            nginx:1.27-alpine nginx -t

  # ------------------------------------------------------------------ #
  # JOB 2 — Build & Testes                                              #
  # ------------------------------------------------------------------ #
  build-test:
    name: Build & Teste
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem (sem push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Subir container de teste
        run: |
          docker run -d --name hospital-test -p 8080:8080 ${{ env.IMAGE_NAME }}:test
          sleep 3

      - name: Testar health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          echo "Health check retornou: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FALHOU — esperado 200" && exit 1)

      - name: Testar se index.html é servido
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Index retornou: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FALHOU — esperado 200" && exit 1)

      - name: Parar container de teste
        if: always()
        run: docker rm -f hospital-test || true

  # ------------------------------------------------------------------ #
  # JOB 3 — Push para o Docker Hub (apenas em push, não em PR)         #
  # ------------------------------------------------------------------ #
  push:
    name: Push → Docker Hub
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'

    outputs:
      image_tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar tags e labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # JOB 4 — Deploy DEV (automático — branch develop)                   #
  # ------------------------------------------------------------------ #
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: dev
      url: http://dev.hospital-amazonas.local

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig (DEV)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: Substituir imagem no manifesto
        run: |
          IMAGE_TAG=$(echo "${{ needs.push.outputs.image_tags }}" | grep "sha-" | head -1)
          sed -i "s|SEU_USUARIO/hospital-amazonas:latest|${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Criar namespace dev (se não existir)
        run: kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply dos manifestos — DEV
        run: kubectl apply -f k8s/ -n dev

      - name: Aguardar rollout
        run: kubectl rollout status deployment/hospital-amazonas -n dev --timeout=120s

      - name: Resumo do deploy
        run: |
          echo "### DEV — Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`dev\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ------------------------------------------------------------------ #
  # JOB 5 — Deploy STAGING (automático — branch main)                  #
  # ------------------------------------------------------------------ #
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://staging.hospital-amazonas.local

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig (Staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Substituir imagem no manifesto
        run: |
          IMAGE_TAG=$(echo "${{ needs.push.outputs.image_tags }}" | grep "sha-" | head -1)
          sed -i "s|SEU_USUARIO/hospital-amazonas:latest|${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Criar namespace staging (se não existir)
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply dos manifestos — Staging
        run: kubectl apply -f k8s/ -n staging

      - name: Aguardar rollout
        run: kubectl rollout status deployment/hospital-amazonas -n staging --timeout=120s

      - name: Resumo do deploy
        run: |
          echo "### Staging — Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`staging\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ------------------------------------------------------------------ #
  # JOB 6 — Deploy PROD (aguarda aprovação manual)                     #
  # ------------------------------------------------------------------ #
  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    needs: [push, deploy-staging]
    environment:
      name: prod                         # <- este environment tem "Required reviewers" configurado
      url: http://hospital-amazonas.com  #    Settings > Environments > prod > Protection rules

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configurar kubeconfig (Prod)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Substituir imagem no manifesto
        run: |
          IMAGE_TAG=$(echo "${{ needs.push.outputs.image_tags }}" | grep "sha-" | head -1)
          sed -i "s|SEU_USUARIO/hospital-amazonas:latest|${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Criar namespace prod (se não existir)
        run: kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply dos manifestos — Prod
        run: kubectl apply -f k8s/ -n prod

      - name: Aguardar rollout
        run: kubectl rollout status deployment/hospital-amazonas -n prod --timeout=180s

      - name: Resumo do deploy
        run: |
          echo "### Prod — Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`prod\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Aprovado por | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
