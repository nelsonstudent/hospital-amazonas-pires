apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Todos os manifestos que compõem a aplicação.
# Os overlays herdam estes recursos e aplicam patches em cima.
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policy.yaml

# Placeholder da imagem — substituído pelo CI via:
#   kustomize edit set image SEU_USUARIO/hospital-amazonas=SEU_USUARIO/hospital-amazonas:<sha>
images:
  - name: nelsonstudent/hospital-amazonas
    newTag: latest
