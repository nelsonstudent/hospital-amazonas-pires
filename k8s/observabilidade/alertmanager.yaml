apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # Configurar SMTP para email (opcional)
      # smtp_smarthost: 'smtp.gmail.com:587'
      # smtp_from: 'alertas@hospital-amazonas-pires.com'
      # smtp_auth_username: 'alertas@hospital-amazonas-pires.com'
      # smtp_auth_password: 'sua-senha-de-app'

    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      group_by: [alertname, namespace, severity]
      group_wait: 30s        # aguarda 30s para agrupar alertas similares
      group_interval: 5m     # intervalo entre notificações do mesmo grupo
      repeat_interval: 4h    # re-notifica a cada 4h se o alerta persistir
      receiver: default

      routes:
        # Alertas críticos — canal dedicado
        - match:
            severity: critical
          receiver: critical
          group_wait: 10s
          repeat_interval: 1h

        # Alertas de warning — canal padrão
        - match:
            severity: warning
          receiver: default
          repeat_interval: 4h

    receivers:
      # Receiver padrão — Slack (warnings)
      - name: default
        slack_configs:
          - api_url: "https://hooks.slack.com/services/SEU_WEBHOOK_AQUI"
            channel: "#hospital-amazonas-pires-alertas"
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Alerta:* {{ .Annotations.summary }}
              *Descrição:* {{ .Annotations.description }}
              *Namespace:* {{ .Labels.namespace }}
              *Severidade:* {{ .Labels.severity }}
              {{ end }}

      # Receiver crítico — Slack com menção @channel
      - name: critical
        slack_configs:
          - api_url: "https://hooks.slack.com/services/SEU_WEBHOOK_AQUI"
            channel: "#hospital-amazonas-pires-critico"
            send_resolved: true
            title: '🚨 [CRÍTICO] {{ .GroupLabels.alertname }}'
            text: |
              <!channel>
              {{ range .Alerts }}
              *Alerta:* {{ .Annotations.summary }}
              *Descrição:* {{ .Annotations.description }}
              *Namespace:* {{ .Labels.namespace }}
              {{ end }}

    inhibit_rules:
      # Se um alerta crítico disparar, suprime o warning do mesmo namespace
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname, namespace]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
