# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.1-standalone-strict/networkpolicy-networking-v1.json
#
# NetworkPolicy — hospital-amazonas-pires
#
# Modelo zero-trust: tudo negado por padrão, liberado explicitamente.
#
# Pré-requisito: CNI com suporte a NetworkPolicy instalado no cluster.
#   Exemplos compatíveis: Calico, Cilium, Weave Net.
#   Kubeadm com flannel padrão NÃO aplica NetworkPolicy.
#
# Para verificar as políticas ativas:
#   kubectl get networkpolicy -n <namespace>
#   kubectl describe networkpolicy hospital-amazonas-pires -n <namespace>
#
# ────────────────────────────────────────────────────────────────────── #
# POLÍTICA 1 — Nega todo tráfego de entrada e saída por padrão         #
# Deve ser a primeira política aplicada no namespace.                   #
# ────────────────────────────────────────────────────────────────────── #
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default         # substituir pelo namespace do ambiente (dev / staging / prod)
  labels:
    app: hospital-amazonas-pires
spec:
  podSelector: {}            # aplica a todos os pods do namespace
  policyTypes:
    - Ingress
    - Egress
---
# ────────────────────────────────────────────────────────────────────── #
# POLÍTICA 2 — Libera entrada vinda do nginx ingress controller         #
#                                                                       #
# O ingress controller fica no namespace ingress-nginx e é o único     #
# componente externo autorizado a bater na porta 8080 da aplicação.    #
# ────────────────────────────────────────────────────────────────────── #
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: default
  labels:
    app: hospital-amazonas-pires
spec:
  podSelector:
    matchLabels:
      app: hospital-amazonas-pires
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# ────────────────────────────────────────────────────────────────────── #
# POLÍTICA 3 — Libera entrada vinda do namespace monitoring             #
#                                                                       #
# Permite que o Prometheus faça scrape do endpoint /health da           #
# aplicação e que o Promtail colete logs via API do kubelet.            #
# ────────────────────────────────────────────────────────────────────── #
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring
  namespace: default
  labels:
    app: hospital-amazonas-pires
spec:
  podSelector:
    matchLabels:
      app: hospital-amazonas-pires
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
---
# ────────────────────────────────────────────────────────────────────── #
# POLÍTICA 4 — Libera saída apenas para o DNS do cluster                #
#                                                                       #
# A aplicação é uma SPA estática servida pelo Nginx — não faz           #
# chamadas externas. O único egress necessário é para resolução         #
# de nomes via kube-dns (CoreDNS) na porta 53.                         #
# ────────────────────────────────────────────────────────────────────── #
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: default
  labels:
    app: hospital-amazonas-pires
spec:
  podSelector:
    matchLabels:
      app: hospital-amazonas-pires
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53