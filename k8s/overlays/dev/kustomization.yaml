apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Herda todos os recursos da base
bases:
  - ../../base

# Namespace de destino — criado pelo pipeline antes do apply
namespace: dev

# Label adicionado a todos os recursos deste overlay
commonLabels:
  environment: dev

# Patches específicos do ambiente dev
patches:
  - path: patches/deployment.yaml
  - path: patches/hpa.yaml
  - path: patches/ingress.yaml

# Imagem substituída pelo CI:
#   kustomize edit set image nelsonstudent/hospital-amazonas-pires=nelsonstudent/hospital-amazonas-pires:<sha>
images:
  - name: nelsonstudent/hospital-amazonas-pires
    newTag: latest
