apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: prod

commonLabels:
  environment: prod

# Prod usa a base sem patches de recursos — já está dimensionada para produção.
# Apenas o host do ingress é sobrescrito.
patches:
  - path: patches/ingress.yaml

images:
  - name: nelsonstudent/hospital-amazonas-pires
    newTag: latest
