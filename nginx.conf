server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip para performance
    gzip on;
    gzip_types text/html text/css application/javascript;

    # Rota principal
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint — retorna 200 OK para o Kubernetes
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Segurança: esconde a versão do Nginx
    server_tokens off;

    # Cache para assets estáticos
    location ~* \.(html|css|js|ico|png|svg)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
